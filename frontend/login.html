<!DOCTYPE html>
<html>

<head>
<title>Halleyx Login</title>

<style>

body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#1e293b;
}

.login{
background:white;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
background:#3b82f6;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login">

<h2>Admin Login</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

async function login(){

let user={
username:document.getElementById("username").value,
password:document.getElementById("password").value
};

let res = await fetch("http://localhost:8080/auth/login",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(user)

});
let layout = JSON.parse(localStorage.getItem("dashboardLayout"));

if(layout){

layout.forEach(w=>{
grid.addWidget(w);
});
}

if(res.ok){

localStorage.setItem("logged","true");

window.location.href="index.html";

}else{

alert("Invalid Login");

}

}

</script>

</body>
</html>
