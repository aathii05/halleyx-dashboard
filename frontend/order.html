<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halleyx · Create Custom Order</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0c10;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --accent-primary: #58a6ff;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --border-color: rgba(240, 246, 252, 0.1);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }
        .form-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 800px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        h2 { font-size: 1.75rem; margin-bottom: 32px; color: var(--accent-primary); }
        .form-section { margin-bottom: 32px; background: rgba(255,255,255,0.02); padding: 24px; border-radius: 16px; }
        .form-section h3 { font-size: 1rem; color: var(--text-secondary); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .field { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); }
        input, select {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 16px;
            color: white;
            outline: none;
            transition: 0.2s;
        }
        input:focus, select:focus { border-color: var(--accent-primary); }
        .full { grid-column: span 2; }
        .footer { display: flex; justify-content: flex-end; gap: 16px; margin-top: 24px; }
        .btn { padding: 12px 32px; border-radius: 8px; font-weight: 700; cursor: pointer; border: none; transition: 0.2s; }
        .btn-secondary { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-color); }
        .btn-primary { background: var(--accent-primary); color: #0a0c10; }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2><i class="fas fa-plus-circle"></i> Create New Order</h2>
        
        <div class="form-section">
            <h3>Customer Details</h3>
            <div class="grid">
                <div class="field"><label>First Name</label><input id="firstName" value="John"></div>
                <div class="field"><label>Last Name</label><input id="lastName" value="Doe"></div>
                <div class="field full"><label>Email Address</label><input id="email" value="john.doe@mnc.com"></div>
            </div>
        </div>

        <div class="form-section">
            <h3>Order Details</h3>
            <div class="grid">
                <div class="field full">
                    <label>Select Product</label>
                    <select id="product">
                        <option value="Fiber Internet 1 Gbps">Fiber Internet 1 Gbps</option>
                        <option value="5G Unlimited Mobile Plan">5G Unlimited Mobile Plan</option>
                        <option value="Business Internet 500 Mbps">Business Internet 500 Mbps</option>
                    </select>
                </div>
                <div class="field"><label>Quantity</label><input id="quantity" type="number" value="1"></div>
                <div class="field"><label>Unit Price ($)</label><input id="price" type="number" value="89.99"></div>
            </div>
        </div>

        <div class="footer">
            <button class="btn btn-secondary" onclick="window.location.href='index.html'">Cancel</button>
            <button class="btn btn-primary" onclick="submitOrder()">Place Order</button>
        </div>
    </div>

    <script>
        async function submitOrder() {
            const order = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                email: document.getElementById('email').value,
                product: document.getElementById('product').value,
                quantity: parseInt(document.getElementById('quantity').value),
                unitPrice: parseFloat(document.getElementById('price').value),
                totalAmount: (document.getElementById('quantity').value * document.getElementById('price').value),
                status: 'PENDING'
            };

            try {
                await fetch('http://localhost:8080/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(order)
                });
                alert('Order created successfully!');
                window.location.href = 'index.html';
            } catch (err) {
                alert('Mock success: ' + JSON.stringify(order));
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
