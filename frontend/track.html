<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halleyx · Track Your Order</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0c10;
            --bg-secondary: #161b22;
            --accent-primary: #58a6ff;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --border-color: rgba(240, 246, 252, 0.1);
            --success: #238636;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at center, #161b22 0%, #0a0c10 100%);
        }
        .track-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .logo {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-primary);
            margin-bottom: 32px;
        }
        h2 { text-align: center; margin-bottom: 32px; font-weight: 600; }
        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
        }
        input {
            flex: 1;
            background: #0a0c10;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 20px;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        button {
            background: var(--accent-primary);
            color: #0a0c10;
            border: none;
            border-radius: 12px;
            padding: 0 24px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        
        /* Timeline */
        .timeline { margin-top: 32px; display: none; }
        .order-info { margin-bottom: 24px; padding: 16px; background: rgba(255,255,255,0.03); border-radius: 12px; }
        .status-flow {
            display: flex;
            justify-content: space-between;
            position: relative;
            margin-top: 40px;
        }
        .status-flow::before {
            content: '';
            position: absolute;
            top: 15px; left: 0; right: 0;
            height: 2px;
            background: var(--border-color);
            z-index: 1;
        }
        .status-step {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 80px;
        }
        .dot {
            width: 32px;
            height: 32px;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .status-step.active .dot { border-color: var(--accent-primary); color: var(--accent-primary); box-shadow: 0 0 15px rgba(88,166,255,0.3); }
        .status-step.completed .dot { background: var(--success); border-color: var(--success); color: white; }
        .status-label { font-size: 0.75rem; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; }
        .status-step.active .status-label { color: var(--text-primary); }
    </style>
</head>
<body>
    <div class="track-card">
        <div class="logo"><i class="fas fa-layer-group"></i> Halleyx</div>
        <h2>Track Your Order</h2>
        <div class="search-box">
            <input type="email" id="email" placeholder="Enter your email address" value="alice.j@example.com">
            <button onclick="track()">Track</button>
        </div>
        
        <div id="timeline" class="timeline">
            <!-- Dynamic Content -->
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        window.track = async function() {
            const email = document.getElementById('email').value;
            const orders = await trackOrders(email);
            const container = document.getElementById('timeline');
            container.style.display = 'block';

            if (orders.length === 0) {
                container.innerHTML = '<p style="text-align:center; color: var(--text-secondary);">No orders found for this email.</p>';
                return;
            }

            const o = orders[0]; // Show latest
            const status = o.status;
            
            container.innerHTML = `
                <div class="order-info">
                    <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                        <span>Order #${o.id}</span>
                        <span style="color: var(--accent-primary)">$${o.totalAmount}</span>
                    </div>
                    <div style="font-weight: 600;">${o.product}</div>
                </div>
                
                <div class="status-flow">
                    <div class="status-step ${['PENDING', 'SHIPPED', 'DELIVERED'].includes(status) ? (status === 'PENDING' ? 'active' : 'completed') : ''}">
                        <div class="dot"><i class="fas fa-clock"></i></div>
                        <span class="status-label">Pending</span>
                    </div>
                    <div class="status-step ${['SHIPPED', 'DELIVERED'].includes(status) ? (status === 'SHIPPED' ? 'active' : 'completed') : ''}">
                        <div class="dot"><i class="fas fa-truck"></i></div>
                        <span class="status-label">Shipped</span>
                    </div>
                    <div class="status-step ${status === 'DELIVERED' ? 'active completed' : ''}">
                        <div class="dot"><i class="fas fa-check"></i></div>
                        <span class="status-label">Delivered</span>
                    </div>
                </div>
                
                <p style="text-align:center; margin-top: 40px; font-size: 0.85rem; color: var(--text-secondary);">
                    Current Status: <strong style="color: var(--text-primary)">${status}</strong>
                </p>
                <div style="text-align:center; margin-top: 24px;">
                    <a href="index.html" style="color: var(--accent-primary); font-size: 0.9rem; text-decoration:none;">Back to Admin Dashboard</a>
                </div>
            `;
        }
    </script>
</body>
</html>
