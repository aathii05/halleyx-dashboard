<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halleyx Dash | MNC Admin Dashboard</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <!-- Main Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <ion-icon name="grid-outline" class="logo-icon"></ion-icon>
                    <span>HalleyxDash</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <div class="nav-section">
                    <p class="section-title">Add Widgets</p>
                    <div class="widget-toolbox" id="widgetToolbox">
                        <div class="toolbox-item" data-type="kpi-group">
                            <ion-icon name="stats-chart-outline"></ion-icon>
                            <span>KPI Summary</span>
                        </div>
                        <div class="toolbox-item" data-type="bar-chart">
                            <ion-icon name="bar-chart-outline"></ion-icon>
                            <span>Bar Chart</span>
                        </div>
                        <div class="toolbox-item" data-type="pie-chart">
                            <ion-icon name="pie-chart-outline"></ion-icon>
                            <span>Pie Chart</span>
                        </div>
                        <div class="toolbox-item" data-type="table">
                            <ion-icon name="list-outline"></ion-icon>
                            <span>Orders Table</span>
                        </div>
                    </div>
                </div>

                <div class="nav-section">
                    <p class="section-title">System Pages</p>
                    <button onclick="window.location.href='order.html'" class="nav-btn secondary">
                        <ion-icon name="add-circle-outline"></ion-icon>
                        <span>New Order</span>
                    </button>
                    <button onclick="window.location.href='track.html'" class="nav-btn secondary">
                        <ion-icon name="search-outline"></ion-icon>
                        <span>Track Order</span>
                    </button>
                </div>

                <div class="nav-section">
                    <p class="section-title">Dashboard Actions</p>
                    <button id="saveLayoutBtn" class="nav-btn secondary">
                        <ion-icon name="save-outline"></ion-icon>
                        <span>Save Layout</span>
                    </button>
                    <button id="resetLayoutBtn" class="nav-btn danger">
                        <ion-icon name="refresh-outline"></ion-icon>
                        <span>Reset Layout</span>
                    </button>
                    <button id="exportExcelBtn" class="nav-btn primary">
                        <ion-icon name="download-outline"></ion-icon>
                        <span>Export CSV</span>
                    </button>
                </div>
            </nav>
            
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="avatar">AD</div>
                    <div class="user-info">
                        <p class="user-name">Admin User</p>
                        <p class="user-role">System Architect</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Dashboard Area -->
        <main class="main-content">
            <header class="dashboard-header">
                <div class="header-left">
                    <h1>MNC Enterprise Dashboard</h1>
                </div>
                <div class="header-right">
                    <div class="status-indicator">
                        <span class="pulse-dot"></span>
                        <span id="apiStatusText">Initializing...</span>
                    </div>
                </div>
            </header>

            <div id="dashboardGrid" class="dashboard-grid">
                <!-- Widgets will be injected here -->
            </div>

            <!-- Loading Overlay -->
            <div id="loadingOverlay" class="loading-overlay hidden">
                <div class="spinner"></div>
                <p>Syncing Analytics...</p>
            </div>
        </main>
    </div>

    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container"></div>

    <!-- Application Scripts -->
    <script src="utils.js"></script>
    <script src="api.js"></script>
    <script src="charts.js"></script>
    <script src="widgets.js"></script>
    <script src="app.js"></script>
</body>
</html>
