<!DOCTYPE html>
<html>

<head>

<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f1f5f9;
display:flex;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#1e293b;
color:white;
height:100vh;
padding:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:40px;
}

.sidebar a{
display:block;
padding:12px;
color:white;
text-decoration:none;
margin-bottom:10px;
border-radius:6px;
}

.sidebar a:hover{
background:#334155;
}

/* MAIN */

.main{
flex:1;
padding:30px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

/* KPI GRID */

.kpi-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.card h3{
margin:0;
color:#64748b;
}

.card h1{
margin-top:10px;
}

/* CHART GRID */

.chart-grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
margin-bottom:30px;
}

.chart-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
height:350px;
}

.chart-card canvas{
width:100% !important;
height:100% !important;
}

/* TABLE */

.table-card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:12px;
border-bottom:1px solid #eee;
text-align:left;
}

button{
padding:6px 10px;
background:red;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<h2>Admin</h2>

<a href="#">Dashboard</a>
<a href="config.html">Dashboard Builder</a>
<a href="order.html">Create Order</a>
<a href="track.html">Track Order</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="header">
<h1>Dashboard</h1>
</div>

<!-- KPI CARDS -->

<div class="kpi-grid">

<div class="card">
<h3>Total Orders</h3>
<h1 id="orders">0</h1>
</div>

<div class="card">
<h3>Total Revenue</h3>
<h1 id="revenue">0</h1>
</div>

<div class="card">
<h3>Pending Orders</h3>
<h1 id="pending">0</h1>
</div>

<div class="card">
<h3>Delivered</h3>
<h1 id="delivered">0</h1>
</div>

</div>

<!-- CHARTS -->

<div class="chart-grid">

<div class="chart-card">
<canvas id="salesChart"></canvas>
</div>

<div class="chart-card">
<canvas id="productChart"></canvas>
</div>

</div>

<!-- ORDERS TABLE -->

<div class="table-card">

<h3>Recent Orders</h3>

<table>

<thead>
<tr>
<th>ID</th>
<th>Customer</th>
<th>Product</th>
<th>Status</th>
<th>Delete</th>
</tr>
</thead>

<tbody id="ordersTable"></tbody>

</table>

</div>

</div>

<script>

const API="http://localhost:8080/orders";

async function loadData(){

let res=await fetch(API);
let orders=await res.json();

document.getElementById("orders").innerText=orders.length;

let revenue=0;
let pending=0;
let delivered=0;

orders.forEach(o=>{

revenue+=o.totalAmount;

if(o.status==="PENDING") pending++;
if(o.status==="DELIVERED") delivered++;

});

document.getElementById("revenue").innerText=revenue;
document.getElementById("pending").innerText=pending;
document.getElementById("delivered").innerText=delivered;

/* TABLE */

let table="";

orders.forEach(o=>{

table+=`
<tr>
<td>${o.id}</td>
<td>${o.firstName}</td>
<td>${o.product}</td>
<td>${o.status}</td>
<td>
<button onclick="deleteOrder(${o.id})">Delete</button>
</td>
</tr>
`;

});

document.getElementById("ordersTable").innerHTML=table;

/* CHARTS */

let productCount={};

orders.forEach(o=>{

productCount[o.product]=(productCount[o.product]||0)+1;

});

new Chart(document.getElementById("salesChart"),{
type:"bar",
data:{
labels:Object.keys(productCount),
datasets:[{
label:"Product Sales",
data:Object.values(productCount)
}]
}
});

new Chart(document.getElementById("productChart"),{
type:"pie",
data:{
labels:Object.keys(productCount),
datasets:[{
data:Object.values(productCount)
}]
}
});

}

async function deleteOrder(id){

await fetch(API+"/"+id,{
method:"DELETE"
});

loadData();

}

loadData();

</script>

</body>

</html>
